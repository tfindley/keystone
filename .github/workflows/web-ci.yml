name: Web CI

# Validate the site on every PR (and on the work branch): the vendored standard is in
# sync with canonical, and the site builds cleanly. No image is pushed here — that's web.yml.

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - "*.md"
      - "capabilities/**"
      - "reference/**"
      - "diagrams/**"
  push:
    branches: [web]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: vendor --check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      # Drift gate: the committed vendored copies must match the canonical standard.
      - name: Verify vendored docs are in sync
        run: npm run vendor:check
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web
