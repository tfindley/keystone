# Serves the Astro/Starlight static build (directory format: /quickstart/ ->
# /quickstart/index.html). TLS is handled upstream by Traefik; this server only
# listens on plain HTTP. Mirrors the syscert web posture.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # don't leak the nginx version
    server_tokens off;

    # compression
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        application/rss+xml image/svg+xml font/ttf font/otf;

    # Baseline security headers. The full CSP (per-page script-src/style-src hashes +
    # default/img/font/connect/object/base 'self') is generated by Astro and delivered
    # via a <meta> tag in each page. The one directive a <meta> CSP can't carry —
    # frame-ancestors — is set here (clickjacking is also covered by X-Frame-Options).
    # HSTS + Server-strip are set at the Traefik edge.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # hashed, immutable build assets (Astro emits content-hashed filenames)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # self-hosted Pagefind search index — same-origin, cacheable
    location /pagefind/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location = /favicon.svg { expires 7d; access_log off; }
    location = /robots.txt  { access_log off; }

    # security.txt must be served as text/plain (RFC 9116)
    location = /.well-known/security.txt {
        default_type text/plain;
        add_header Cache-Control "no-cache";
    }

    # liveness/readiness probe — cheap, unlogged, no body to render
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # clean URLs for Astro's directory output
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
}
